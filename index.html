<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>한세대학교 챗봇</title>
    <!-- 폰트 적용 (Pretendard) -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="style.css">
    <!-- 아이콘 라이브러리 (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Markdown 파서 (marked.js) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div id="mobile-frame">
        <!-- 상단 헤더 -->
        <header class="chat-header">
            <button class="icon-btn" aria-label="메뉴"><i data-lucide="menu"></i></button>
            <h1 class="header-title-container">
                <img src="chatbot_logo.png" alt="Hansei 챗봇 한비" class="header-bot-logo">
                <span class="header-title-text">HANSEI 챗봇, 한비(韓飛)</span>
            </h1>
            <button class="icon-btn" aria-label="닫기"><i data-lucide="x"></i></button>
        </header>

        <!-- 채팅 영역 -->
        <main class="chat-scroll-area" id="chatbox">
            <!-- 날짜 구분선 -->
            <div class="date-divider"><span>오늘</span></div>

            <!-- 봇 환영 메시지 -->
            <div class="message-row bot-row welcome-section">
                <div class="bot-avatar">
                    <img src="hanbi.gif" alt="한비">
                </div>
                <div class="message-bubble bot-bubble">
                    안녕하세요! 저는 한세대학교의 든든한 AI 챗봇, <strong>한비(韓飛)</strong>예요. <br><br>
                    'Soar High! Reach Higher!'라는 멋진 슬로건처럼, 영광의 100주년을 향해 높고 멀리 비상하고자 하는 우리 대학의 꿈을 함께 만들어가기 위해 태어났답니다. <br><br>
                    궁금한 점이 있으시다면 언제든지, 무엇이든지 물어봐 주세요! <br>
                    질문을 더 구체적으로 해주실수록, 제가 더 정확하고 도움이 되는 답변을 드릴 수 있다는 사실, 잊지 마시고요!
                </div>
            </div>

            <!-- 퀵 메뉴 영역 (자주하는 질문) -->
            <div class="quick-menu-wrapper">
                <div class="quick-menu-title">자주하는 질문</div>
                <div class="quick-menu-grid">
                    <button class="quick-card" onclick="sendQuickMessage('학사일정')">
                        <div class="quick-icon"><i data-lucide="calendar"></i></div>
                        <span>학사일정</span>
                    </button>
                    <button class="quick-card" onclick="sendQuickMessage('장학금')">
                        <div class="quick-icon"><i data-lucide="graduation-cap"></i></div>
                        <span>장학금</span>
                    </button>
                    <button class="quick-card" onclick="sendQuickMessage('증명서')">
                        <div class="quick-icon"><i data-lucide="file-text"></i></div>
                        <span>증명서</span>
                    </button>
                    <button class="quick-card" onclick="sendQuickMessage('학사정보')">
                        <div class="quick-icon"><i data-lucide="book-open"></i></div>
                        <span>학사정보</span>
                    </button>
                    <button class="quick-card" onclick="sendQuickMessage('교내 인터넷 사용')">
                        <div class="quick-icon"><i data-lucide="wifi"></i></div>
                        <span>인터넷</span>
                    </button>
                    <button class="quick-card" onclick="sendQuickMessage('주요 전화번호')">
                        <div class="quick-icon"><i data-lucide="phone"></i></div>
                        <span>전화번호</span>
                    </button>
                </div>
            </div>
        </main>

        <!-- 하단 입력창 -->
        <footer class="chat-footer">
            <button class="plus-btn"><i data-lucide="plus"></i></button>
            <div class="input-container">
                <input type="text" id="chatInput" placeholder="질문을 입력해주세요..." onkeypress="handleEnter(event)">
                <button class="send-btn" onclick="sendMessage()"><i data-lucide="send"></i></button>
            </div>
        </footer>
    </div>

    <script src="app.js"></script>
    <script>
        // Lucide 아이콘 렌더링
        lucide.createIcons();
    </script>
</body>

</html>
